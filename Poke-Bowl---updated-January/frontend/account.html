<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Poke Bowl Inventory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f1419;
            color: #e8eaed;
            overflow-x: hidden;
        }
        /* ---- Sidebar ---- */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1999; opacity: 0; pointer-events: none; transition: opacity .3s; }
        .sidebar-overlay.active { opacity: 1; pointer-events: auto; }
        .sidebar { position: fixed; top: 0; left: 0; width: 270px; height: 100vh; background: linear-gradient(180deg,#1a2332 0%,#151d28 100%); z-index: 2000; transform: translateX(-100%); transition: transform .3s ease; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,.08); box-shadow: 4px 0 24px rgba(0,0,0,.4); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
        .sidebar-brand { font-size: 18px; font-weight: 700; color: #fff; }
        .sidebar-close { background: none; border: none; color: #9aa0a6; font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all .15s; line-height: 1; }
        .sidebar-close:hover { background: rgba(255,255,255,.08); color: #fff; }
        .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 12px 14px; color: #9aa0a6; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all .15s; }
        .sidebar-link:hover { background: rgba(255,255,255,.06); color: #e8eaed; }
        .sidebar-link.active { background: rgba(76,175,80,.12); color: #4CAF50; font-weight: 600; }
        .sidebar-link svg { width: 20px; height: 20px; fill: currentColor; flex-shrink: 0; }
        /* ---- Header ---- */
        .menu-btn { background: none; border: 1px solid rgba(255,255,255,.1); color: #e8eaed; cursor: pointer; padding: 8px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all .2s; margin-right: 12px; }
        .menu-btn:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.2); }
        .menu-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .header-left { display: flex; align-items: center; }
        .container { display: flex; flex-direction: column; min-height: 100vh; padding: 16px; max-width: 800px; margin: 0 auto; }
        header { background: linear-gradient(135deg,#1e2936 0%,#252f3d 100%); padding: 16px 24px; border-radius: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.05); }
        h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -.5px; }
        .back-link { color: #9aa0a6; text-decoration: none; font-size: 13px; font-weight: 500; padding: 8px 14px; border: 1px solid rgba(255,255,255,.1); border-radius: 8px; transition: all .2s; }
        .back-link:hover { color: #e8eaed; border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.04); }
        /* ---- Panel ---- */
        .panel { background: linear-gradient(135deg,#1e2936 0%,#252f3d 100%); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.05); margin-bottom: 16px; }
        .panel-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,.08); }
        /* Info row */
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-size: 13px; color: #9aa0a6; font-weight: 500; }
        .info-value { font-size: 14px; color: #e8eaed; font-weight: 600; }
        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #9aa0a6; margin-bottom: 6px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(15,20,25,.6);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 8px;
            color: #e8eaed;
            font-size: 14px;
            font-family: inherit;
            transition: border-color .2s;
        }
        .form-group input:focus { outline: none; border-color: rgba(76,175,80,.5); }
        .submit-btn {
            padding: 10px 24px;
            background: rgba(76,175,80,.15);
            border: 1px solid rgba(76,175,80,.3);
            border-radius: 8px;
            color: #4CAF50;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }
        .submit-btn:hover { background: rgba(76,175,80,.25); border-color: rgba(76,175,80,.5); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        /* Messages */
        .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-bottom: 16px; display: none; }
        .msg.success { display: block; background: rgba(76,175,80,.1); border: 1px solid rgba(76,175,80,.25); color: #4CAF50; }
        .msg.error { display: block; background: rgba(244,67,54,.1); border: 1px solid rgba(244,67,54,.25); color: #f44336; }
        /* Logout section */
        .logout-section { margin-top: 8px; }
        .logout-btn {
            padding: 10px 24px;
            background: rgba(244,67,54,.1);
            border: 1px solid rgba(244,67,54,.3);
            border-radius: 8px;
            color: #f44336;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }
        .logout-btn:hover { background: rgba(244,67,54,.2); border-color: rgba(244,67,54,.5); }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-brand">Poke Bowl</span>
            <button class="sidebar-close" id="sidebarClose">&times;</button>
        </div>
        <div class="sidebar-nav">
            <a href="index.html" class="sidebar-link"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg><span>Dashboard</span></a>
            <a href="upload.html" class="sidebar-link"><svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg><span>Upload</span></a>
            <a href="analytics.html" class="sidebar-link"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H5V7h7v10z"/><path d="M6 9h4v2H6zm0 3h4v2H6zm0 3h4v2H6zm7-6h4v8h-4z"/></svg><span>Data & Analytics</span></a>
            <a href="account.html" class="sidebar-link active"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg><span>Account</span></a>
        </div>
    </nav>

    <div class="container">
        <header>
            <div class="header-left">
                <button class="menu-btn" id="menuBtn" title="Open menu">
                    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <h1>Account</h1>
            </div>
            <a href="index.html" class="back-link">Back to Dashboard</a>
        </header>

        <!-- Account Info -->
        <div class="panel">
            <div class="panel-title">Account Details</div>
            <div class="info-row">
                <span class="info-label">Username</span>
                <span class="info-value" id="infoUsername">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Authentication</span>
                <span class="info-value" id="infoAuth">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Plan</span>
                <span class="info-value">Production</span>
            </div>
        </div>

        <!-- Change Password -->
        <div class="panel">
            <div class="panel-title">Change Password</div>
            <div class="msg" id="pwMsg"></div>
            <form id="pwForm">
                <div class="form-group">
                    <label for="currentPw">Current Password</label>
                    <input type="password" id="currentPw" name="current_password" required autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label for="newPw">New Password</label>
                    <input type="password" id="newPw" name="new_password" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirmPw">Confirm New Password</label>
                    <input type="password" id="confirmPw" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="submit-btn" id="pwSubmit">Update Password</button>
            </form>
        </div>

        <!-- Logout -->
        <div class="panel logout-section">
            <div class="panel-title">Session</div>
            <p style="font-size:13px;color:#9aa0a6;margin-bottom:14px;">Log out of the current session. You will be redirected to the login page.</p>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <script>
        // Sidebar
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const sidebarClose = document.getElementById('sidebarClose');
        function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('active'); }
        function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); }
        menuBtn.addEventListener('click', openSidebar);
        sidebarClose.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        // Load account info
        async function loadAccountInfo() {
            try {
                const res = await fetch('/api/account/info', { credentials: 'same-origin' });
                if (res.status === 401) { window.location.href = '/login'; return; }
                const data = await res.json();
                document.getElementById('infoUsername').textContent = data.username || '-';
                document.getElementById('infoAuth').textContent = data.auth_enabled ? 'Enabled (bcrypt + HMAC sessions)' : 'Disabled';
            } catch (err) {
                console.error('Failed to load account info:', err);
            }
        }
        loadAccountInfo();

        // Change password form
        const pwForm = document.getElementById('pwForm');
        const pwMsg = document.getElementById('pwMsg');
        const pwSubmit = document.getElementById('pwSubmit');

        pwForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            pwMsg.className = 'msg';
            pwMsg.style.display = 'none';

            const currentPw = document.getElementById('currentPw').value;
            const newPw = document.getElementById('newPw').value;
            const confirmPw = document.getElementById('confirmPw').value;

            if (newPw !== confirmPw) {
                pwMsg.className = 'msg error';
                pwMsg.textContent = 'New passwords do not match.';
                return;
            }

            if (newPw.length < 8) {
                pwMsg.className = 'msg error';
                pwMsg.textContent = 'New password must be at least 8 characters.';
                return;
            }

            pwSubmit.disabled = true;
            pwSubmit.textContent = 'Updating...';

            try {
                const res = await fetch('/api/account/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ current_password: currentPw, new_password: newPw }),
                });
                const data = await res.json();

                if (data.success) {
                    pwMsg.className = 'msg success';
                    pwMsg.textContent = data.message;
                    pwForm.reset();
                } else {
                    pwMsg.className = 'msg error';
                    pwMsg.textContent = data.message || 'Password change failed.';
                }
            } catch (err) {
                pwMsg.className = 'msg error';
                pwMsg.textContent = 'Network error: ' + err.message;
            } finally {
                pwSubmit.disabled = false;
                pwSubmit.textContent = 'Update Password';
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            fetch('/api/logout', { method: 'POST', credentials: 'same-origin' })
                .then(() => { window.location.href = '/login'; })
                .catch(() => { window.location.href = '/login'; });
        });
    </script>
</body>
</html>
